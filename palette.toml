comment      = ["abyssal: deep cosmic blue"]
base         = "#0a1020"
surface      = "#141b30"
overlay      = "#1f2942"
_nc          = "#070b18"
hl_low       = "#1f2330"
hl_med       = "#3a4358"
hl_high      = "#4c576e"
